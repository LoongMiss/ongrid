# Grafana datasource provisioning for the ongrid systemd install.
# Mirrors deploy/install/grafana/provisioning/datasources/ — the compose
# variant — so dashboards from either install topology see the same
# datasource UIDs. Wired by install-deps.sh into
# /etc/grafana/provisioning/datasources/ongrid.yaml on first install.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    uid: prometheus
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      manageAlerts: false

  - name: Loki
    type: loki
    access: proxy
    url: http://127.0.0.1:3100
    uid: loki
    editable: false
    jsonData:
      maxLines: 1000

  - name: Tempo
    type: tempo
    access: proxy
    url: http://127.0.0.1:3200
    uid: tempo
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        mapTagNamesEnabled: true
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
      tracesToMetrics:
        datasourceUid: prometheus
