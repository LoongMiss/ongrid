# nginx site for the ongrid systemd install — mirrors the compose-mode
# nginx.conf. Installed by install-deps.sh at /etc/nginx/conf.d/ongrid.conf.
# After first install you'll want to:
#   1. Edit `server_name` below.
#   2. Replace self-signed certs at /etc/ongrid/certs/.
#   3. `nginx -t && systemctl reload nginx`.

# ----- TLS server -----
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ongrid/certs/tls.crt;
    ssl_certificate_key /etc/ongrid/certs/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # WebSocket upgrade for /ws and SSE
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # ongrid manager — HTTP API + SSE + UI assets.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_buffering    off;            # SSE / streaming chat
        proxy_read_timeout 600s;
    }

    # Grafana under /grafana/ — needs root_url=%(protocol)s://%(domain)s/grafana/
    # in /etc/grafana/grafana.ini for absolute URLs to work.
    location /grafana/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ----- HTTP redirect -----
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
